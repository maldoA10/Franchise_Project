# Plantilla de configuración - copia este archivo como application.yml y ajusta los valores según tu entorno local

spring:
  application:
    name: franchise-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/franchisedb}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.accenture.franchise: DEBUG
    org.springframework.data.mongodb: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always