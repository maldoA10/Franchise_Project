services:

  mongodb:
    image: mongo:7.0
    container_name: franchise-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: franchisedb
    volumes:
      - mongo-data:/data/db
    networks:
      - franchise-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: franchise-app
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/franchisedb
      SERVER_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - franchise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongo-data:

networks:
  franchise-network:
    driver: bridge